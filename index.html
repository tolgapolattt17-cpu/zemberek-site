<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zemberek - Lüks Saat Koleksiyonu Yöneticisi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #0D0D0D;
            color: #FFFFFF;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
        }

        .logo {
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #D4AF37;
        }

        .logo span {
            color: #FFFFFF;
        }

        .tagline {
            font-size: 20px;
            color: #CCCCCC;
            margin-bottom: 60px;
        }

        .app-icon {
            width: 150px;
            height: 150px;
            border-radius: 30px;
            background: linear-gradient(135deg, #1A1A2E 0%, #16213E 100%);
            margin: 0 auto 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.2);
        }

        .app-icon svg {
            width: 80px;
            height: 80px;
            color: #D4AF37;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 300px;
            margin: 0 auto;
        }

        .links a {
            display: block;
            padding: 16px 32px;
            background-color: #1A1A1A;
            color: #FFFFFF;
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid #333333;
        }

        .links a:hover {
            background-color: #D4AF37;
            color: #000000;
            border-color: #D4AF37;
        }

        .store-badge {
            margin-top: 60px;
        }

        .store-badge img {
            height: 50px;
        }

        .footer {
            margin-top: 80px;
            padding-top: 20px;
            border-top: 1px solid #333333;
            font-size: 14px;
            color: #666666;
        }

        .footer a {
            color: #D4AF37;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/>
            </svg>
        </div>

        <div class="logo">
            <h1><span>ZEM</span>BEREK</h1>
        </div>

        <p class="tagline">Lüks Saat Koleksiyonu Yöneticisi</p>

        <div class="links">
            <a href="privacy-policy.html">Gizlilik Politikası</a>
            <a href="terms-of-service.html">Kullanım Koşulları</a>
            <a href="privacy-policy-en.html">Privacy Policy (EN)</a>
            <a href="terms-of-service-en.html">Terms of Service (EN)</a>
        </div>

        <div class="store-badge">
            <!-- App Store badge will go here when app is published -->
            <p style="color: #666666; font-size: 14px;">App Store'da yakında</p>
        </div>

        <div class="footer">
            <p>&copy; 2026 Zemberek. Tüm hakları saklıdır.</p>
            <p style="margin-top: 8px;">
                <a href="mailto:destek@zemberek.app">destek@zemberek.app</a>
            </p>
        </div>
    </div>
</body>
</html>
